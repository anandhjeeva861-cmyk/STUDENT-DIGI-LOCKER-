<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Registration - Student Digital Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet"><link href="assets/css/login.css" rel="stylesheet"><link href="assets/css/theme.css" rel="stylesheet">
</head><body>
<div class="theme-toggle-auth" data-theme-toggle>
  <button type="button" class="theme-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
</div>
<div class="auth-wrapper"><div class="auth-card" style="max-width:620px">
  <div class="text-center">
    <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
    <h3 class="auth-title">Create Your Account</h3>
    <p class="auth-sub">Join the Student Digital Locker and secure your academic journey.</p>
  </div>
  <form id="registerForm" novalidate>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label" for="fullName">Full Name</label><input id="fullName" name="fullName" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label" for="registerNumber">Register Number</label><input id="registerNumber" name="registerNumber" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label" for="department">Department</label>
        <select id="department" name="department" class="form-select" data-department-select required>
          <option value="">Select Department</option>
        </select></div>
      <div class="col-md-6"><label class="form-label" for="year">Year</label><select id="year" name="year" class="form-select" data-year-select required><option value="">Select Year</option></select></div>
      <div class="col-md-6"><label class="form-label" for="mobile">Mobile Number</label><input id="mobile" name="mobile" class="form-control" maxlength="10" required></div>
      <div class="col-12"><label class="form-label" for="email">College Email</label><input id="email" name="email" type="email" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label" for="password">Password</label>
        <div class="password-field"><input id="password" name="password" type="password" class="form-control" required>
          <button type="button" class="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button></div>
        <div class="pw-meter"><div class="bar"></div></div>
      </div>
      <div class="col-md-6"><label class="form-label" for="confirmPassword">Confirm Password</label>
        <div class="password-field"><input id="confirmPassword" name="confirmPassword" type="password" class="form-control" required>
          <button type="button" class="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button></div>
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary flex-fill" type="submit">Create account</button>
      <button class="btn btn-outline-secondary" type="reset">Reset</button>
      <button class="btn btn-link" type="button" onclick="location.href='index.html'">Cancel</button>
    </div>
  </form>
</div></div>
<script type="module" src="assets/js/constants.js"></script>
<script type="module" src="assets/js/firebase-init.js"></script>
<script type="module" src="assets/js/firebase-services.js"></script>
<script type="module" src="assets/js/wait-for-firebase.js"></script>
<script type="module" src="assets/js/auth-guard.js"></script>
<script type="module" src="assets/js/app.js"></script>
<script type="module" src="assets/js/validation.js"></script>
<script type="module" src="assets/js/login.js"></script>
<script type="module">window.handleRegister('registerForm');</script>
</body></html>
