<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Teacher Profile - Student Locker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div data-layout="teacher">
    <div class="page-header">
      <div>
        <h2>Teacher Profile</h2>
        <p>Manage your faculty identity and account security</p>
      </div>
    </div>

    <div class="sl-card">
      <ul class="nav nav-tabs" id="profileTabs" role="tablist">
        <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#view-profile" type="button" role="tab">View Profile</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#change-password" type="button" role="tab">Change Password</button></li>
        <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#change-email" type="button" role="tab">Change Email</button></li>
      </ul>

      <div class="tab-content pt-4">
        <div class="tab-pane fade show active" id="view-profile" role="tabpanel">
          <div class="row g-4">
            <div class="col-md-3 text-center">
              <img id="profilePhoto" class="profile-photo" alt="Teacher profile picture">
              <h5 class="mt-3" id="pName">Teacher Name</h5>
              <span class="badge-info"><i class="fas fa-user-tie me-1"></i>Teacher</span>
            </div>
            <div class="col-md-9">
              <div class="row g-3">
                <div class="col-md-6"><small class="text-muted">Department</small><div id="pDept">-</div></div>
                <div class="col-md-6"><small class="text-muted">Designation</small><div id="pDesignation">-</div></div>
                <div class="col-md-6"><small class="text-muted">Email</small><div id="pEmail">-</div></div>
                <div class="col-md-6"><small class="text-muted">Phone Number</small><div id="pPhone">-</div></div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-pane fade" id="change-password" role="tabpanel">
          <form id="changePasswordForm">
            <div class="row" style="max-width: 420px">
              <div class="col-12 mb-3"><label class="form-label">New Password</label><input type="password" name="newPassword" class="form-control" required minlength="8"></div>
              <div class="col-12 mb-3"><label class="form-label">Confirm New Password</label><input type="password" name="confirmPassword" class="form-control" required minlength="8"></div>
            </div>
            <button class="btn btn-primary" type="submit">Update Password</button>
          </form>
        </div>

        <div class="tab-pane fade" id="change-email" role="tabpanel">
          <form id="changeEmailForm">
            <div class="row" style="max-width: 420px">
              <div class="col-12 mb-3"><label class="form-label">New Email</label><input type="email" name="newEmail" class="form-control" required></div>
            </div>
            <button class="btn btn-primary" type="submit">Update Email</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/constants.js"></script>
  <script type="module" src="assets/js/firebase-init.js"></script>
  <script type="module" src="assets/js/firebase-services.js"></script>
  <script type="module" src="assets/js/wait-for-firebase.js"></script>
  <script type="module" src="assets/js/auth-guard.js"></script>
  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/layout.js"></script>
  <script type="module">
    const fields = {
      photo: document.getElementById('profilePhoto'),
      name: document.getElementById('pName'),
      dept: document.getElementById('pDept'),
      designation: document.getElementById('pDesignation'),
      email: document.getElementById('pEmail'),
      phone: document.getElementById('pPhone')
    };

    const defaultPhoto = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 120%22%3E%3Crect width=%22120%22 height=%22120%22 rx=%2224%22 fill=%22%23e0ecff%22/%3E%3Ccircle cx=%2260%22 cy=%2246%22 r=%2222%22 fill=%22%232563eb%22/%3E%3Cpath d=%22M24 104c5-22 19-34 36-34s31 12 36 34%22 fill=%22%232563eb%22/%3E%3C/svg%3E';

    async function renderProfile() {
      const user = await window.authService.currentUser();
      if (!user) {
        window.location.href = 'teacher-login.html';
        return;
      }

      const profile = await window.userService.getCurrentProfile('teacher');
      if (!profile) return;

      fields.photo.src = profile.profilePhotoUrl || defaultPhoto;
      fields.name.textContent = profile.fullName || 'Teacher Name';
      fields.dept.textContent = profile.department || '-';
      fields.designation.textContent = profile.designation || '-';
      fields.email.textContent = profile.email || user.email || '-';
      fields.phone.textContent = profile.phone || '-';
      localStorage.setItem('sl_user', JSON.stringify({ uid: user.uid, name: profile.fullName, email: profile.email, role: 'teacher' }));
      localStorage.setItem('sl_profile', JSON.stringify({ uid: user.uid, ...profile }));
    }

    document.getElementById('changePasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(event.target);
      if (formData.get('newPassword') !== formData.get('confirmPassword')) {
        slToast('Passwords do not match', 'error');
        return;
      }
      if (passwordStrength(formData.get('newPassword')) < 2) {
        slToast('Use a stronger password', 'error');
        return;
      }

      try {
        await window.authService.changePassword(formData.get('newPassword'));
        slToast('Password updated successfully', 'success');
        event.target.reset();
      } catch (error) {
        slToast(error.message || 'Unable to update password', 'error');
      }
    });

    document.getElementById('changeEmailForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        const email = new FormData(event.target).get('newEmail');
        if (!isEmail(email)) throw new Error('Please enter a valid email address.');
        await window.authService.changeEmail(email);
        slToast('Email updated successfully', 'success');
        event.target.reset();
        renderProfile();
      } catch (error) {
        slToast(error.message || 'Unable to update email', 'error');
      }
    });

    renderProfile();
  </script>
</body>
</html>
