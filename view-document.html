<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>View Document - Student Locker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
</head><body>
<div data-layout="student">
  <div class="page-header"><h2 id="docTitle">Document</h2>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" onclick="doDownload()"><i class="fas fa-download me-1"></i>Download</button>
      <button class="btn btn-outline-primary" onclick="window.print()"><i class="fas fa-print me-1"></i>Print</button>
      <button class="btn btn-outline-danger" onclick="doDelete()"><i class="fas fa-trash me-1"></i>Delete</button>
      <button class="btn btn-link" onclick="history.back()">Back</button>
    </div>
  </div>
  <div class="sl-card"><div id="viewer" class="text-center"></div></div>
</div>
<script type="module" src="assets/js/constants.js"></script>
<script type="module" src="assets/js/firebase-init.js"></script>
<script type="module" src="assets/js/firebase-services.js"></script>
<script type="module" src="assets/js/wait-for-firebase.js"></script>
<script type="module" src="assets/js/auth-guard.js"></script>
<script type="module" src="assets/js/app.js"></script><script type="module" src="assets/js/layout.js"></script><script type="module" src="assets/js/dashboard.js"></script>
<script type="module">
  const id = new URLSearchParams(location.search).get('id');
  const category = new URLSearchParams(location.search).get('category') || '';
  let d = null;

  function fileUrl(doc) {
    return doc?.documentUrl || doc?.fileUrl || doc?.dataUrl || '';
  }

  function fileType(doc) {
    return doc?.fileType || doc?.type || '';
  }

  async function loadDocument() {
    const user = await window.authService.currentUser();
    d = await window.documentService.getDocumentById(id, { uid: user?.uid || '', category });
    const viewer = document.getElementById('viewer');
    viewer.replaceChildren();

    if(!d){
    const empty = document.createElement('p');
    empty.className = 'text-muted p-4';
    empty.textContent = 'Document not found.';
      viewer.appendChild(empty);
      return;
    }

    document.getElementById('docTitle').textContent = d.title;
    const type = fileType(d);
    const url = fileUrl(d);

    if(!url) {
      const empty = document.createElement('p');
      empty.className = 'text-muted p-4';
      empty.textContent = 'Preview is not available for this document.';
      viewer.appendChild(empty);
    } else if(type.startsWith('image/')) {
      const image = document.createElement('img');
      image.src = url;
      image.className = 'img-fluid rounded';
      viewer.appendChild(image);
    } else if(type === 'application/pdf') {
      const frame = document.createElement('iframe');
      frame.src = url;
      frame.style.cssText = 'width:100%;height:75vh;border:0';
      viewer.appendChild(frame);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'p-5';
      wrap.innerHTML = '<i class="fas fa-file fa-3x text-primary mb-3"></i>';
      const title = document.createElement('h5');
      title.textContent = 'Preview is not supported for this file type.';
      wrap.appendChild(title);
      viewer.appendChild(wrap);
    }
  }

  window.doDownload = function doDownload(){
    const url = fileUrl(d);
    if(d && url){
      const a=document.createElement('a');
      a.href=url;
      a.download=d.fileName || d.filename || d.title || 'document';
      a.click();
    }
  };
  window.doDelete = async function doDelete(){
    if(!d) return;
    if(!confirm('Delete this document?')) return;
    await window.documentService.deleteDocument(d.id, d.category || category);
    slToast('Deleted','success');
    setTimeout(()=>history.back(),500);
  };

  loadDocument().catch((error) => {
    slToast(error.message || 'Unable to open document', 'error');
  });
</script>
</body></html>
