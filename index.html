<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Student Digital Locker provides secure academic records, student verification, and document management for modern institutions.">
    <title>Student Digital Locker | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/login.css" rel="stylesheet">
</head>
<body>

<div class="theme-toggle-auth" data-theme-toggle>
    <button type="button" class="theme-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="assets/img/sankara-logo.png" alt="Sankara Educational Institutions logo">
            </div>
            <h1 class="auth-title">Student Digital Locker</h1>
            <p class="auth-subtitle">A premium portal for secure academic documents and campus records.</p>
        </div>

        <div id="chooseRole">
            <div class="choose-grid">
                <div class="role-card" onclick="showLogin('student')">
                    <i class="fas fa-user-graduate"></i>
                    <h6>Student Login</h6>
                    <small>Access certificates and documents</small>
                </div>
                <div class="role-card" onclick="location.href='teacher-login.html'">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <h6>Teacher Login</h6>
                    <small>Manage academic records</small>
                </div>
            </div>
            <p class="create-account-link">New student? <a href="student-register.html">Create your account</a></p>
        </div>

        <form id="studentLoginForm" class="d-none mt-3" novalidate>
            <h5 class="mb-3"><i class="fas fa-user-graduate me-2 text-primary"></i>Student Login</h5>
            <div class="mb-3">
                <label class="form-label" for="studentEmail">Email</label>
                <input id="studentEmail" name="email" type="email" class="form-control" placeholder="you@college.edu" required>
            </div>
            <div class="mb-2">
                <label class="form-label" for="studentPassword">Password</label>
                <div class="password-field">
                    <input id="studentPassword" name="password" type="password" class="form-control" placeholder="••••••" required>
                    <button type="button" class="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="auth-links">
                <label class="d-flex align-items-center"><input type="checkbox" class="form-check-input me-2">Remember me</label>
                <a href="#" onclick="event.preventDefault();handleForgotPassword()">Forgot password?</a>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" type="submit">Login</button>
                <button class="btn btn-outline-primary" type="button" onclick="location.href='student-register.html'">Register as Student</button>
                <button type="button" class="btn btn-link" onclick="backToChoose()">← Back to role selection</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="/src/main.js"></script>
<script type="module" src="/src/page-specific/index.js"></script>
</body>
</html>
