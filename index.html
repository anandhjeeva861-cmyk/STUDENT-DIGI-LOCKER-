<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Student Digital Locker provides secure academic records, student verification, and document management for modern institutions.">
<title>Student Digital Locker | Secure Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">
<link href="assets/css/login.css" rel="stylesheet">
<link href="assets/css/theme.css" rel="stylesheet">
<link href="assets/css/responsive.css" rel="stylesheet">
</head>
<body>
<div class="theme-toggle-auth" data-theme-toggle>
  <button type="button" class="theme-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
</div>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center">
      <div class="auth-logo auth-logo-img"><img class="portal-logo portal-logo-auth" src="assets/img/sankara-logo.png" alt="Sankara Educational Institutions logo"></div>
      <h3 class="auth-title">Student Digital Locker</h3>
      <p class="auth-sub">A premium portal for secure academic documents and campus records.</p>
    </div>

    <div id="chooseRole">
      <div class="choose-grid">
        <div class="role-card" onclick="showLogin('student')">
          <i class="fas fa-user-graduate"></i>
          <h6 class="mb-1">Student Login</h6>
          <small class="text-muted">Access certificates and documents</small>
        </div>
        <div class="role-card" onclick="location.href='teacher-login.html'">
          <i class="fas fa-chalkboard-teacher"></i>
          <h6 class="mb-1">Teacher Login</h6>
          <small class="text-muted">Manage academic records</small>
        </div>
      </div>
      <p class="text-center mt-4 mb-0">New student? <a href="student-register.html">Create your account</a></p>
    </div>

    <form id="studentLoginForm" class="d-none mt-3" novalidate>
      <h5 class="mb-3"><i class="fas fa-user-graduate me-2 text-primary"></i>Student Login</h5>
      <div class="mb-3">
        <label class="form-label" for="studentEmail">Email</label>
        <input id="studentEmail" name="email" type="email" class="form-control" placeholder="you@college.edu" required>
      </div>
      <div class="mb-2">
        <label class="form-label" for="studentPassword">Password</label>
        <div class="password-field">
          <input id="studentPassword" name="password" type="password" class="form-control" placeholder="••••••" required>
          <button type="button" class="toggle-pw" aria-label="Toggle password"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="auth-links">
        <label><input type="checkbox" class="form-check-input me-1"> Remember me</label>
        <a href="#" onclick="event.preventDefault();handleForgotPassword()">Forgot password?</a>
      </div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
      <button class="btn btn-outline-primary w-100 mt-2" type="button" onclick="location.href='student-register.html'">Register as Student</button>
      <button type="button" class="btn btn-link w-100 mt-1" onclick="backToChoose()">← Back</button>
    </form>
  </div>
</div>
<script type="module" src="assets/js/constants.js"></script>
<script type="module" src="assets/js/firebase-config.generated.js"></script>
<script type="module" src="assets/js/firebase-init.js"></script>
<script type="module" src="assets/js/firebase-services.js"></script>
<script type="module" src="assets/js/wait-for-firebase.js"></script>
<script type="module" src="assets/js/auth-guard.js"></script>
<script type="module" src="assets/js/app.js"></script>
<script type="module" src="assets/js/validation.js"></script>
<script type="module" src="assets/js/login.js"></script>
<script type="module">
  window.showLogin = function showLogin(role){
    document.getElementById('chooseRole').classList.add('d-none');
    document.getElementById('studentLoginForm').classList.remove('d-none');
  };
  window.backToChoose = function backToChoose(){
    document.getElementById('chooseRole').classList.remove('d-none');
    document.getElementById('studentLoginForm').classList.add('d-none');
  };
  window.handleForgotPassword = async function handleForgotPassword() {
    const email = document.getElementById('studentEmail').value;
    if (!email) {
      slToast('Please enter your email address.', 'error');
      return;
    }
    try {
      await window.authService.sendPasswordReset(email);
      slToast('Password reset request accepted.', 'success');
    } catch (error) {
      slToast(error.message, 'error');
    }
  };
  window.handleLogin('studentLoginForm','student');
</script>
</body>
</html>
