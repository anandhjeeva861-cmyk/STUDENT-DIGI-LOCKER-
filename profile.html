<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Profile - Student Locker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" rel="stylesheet">
    <link href="assets/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div data-layout="student">
        <div class="page-header">
            <div>
                <h2>My Profile</h2>
                <p>Your personal information and account settings</p>
            </div>
        </div>

        <div class="sl-card">
            <ul class="nav nav-tabs" id="profileTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="view-profile-tab" data-bs-toggle="tab" data-bs-target="#view-profile" type="button" role="tab">View Profile</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="change-password-tab" data-bs-toggle="tab" data-bs-target="#change-password" type="button" role="tab">Change Password</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="change-email-tab" data-bs-toggle="tab" data-bs-target="#change-email" type="button" role="tab">Change Email</button>
                </li>
            </ul>

            <div class="tab-content pt-4" id="profileTabsContent">
                <!-- View Profile Tab -->
                <div class="tab-pane fade show active" id="view-profile" role="tabpanel">
                    <div class="row g-4">
                        <div class="col-md-3 text-center">
                            <div class="sl-icon-circle" style="width:120px;height:120px;font-size:3.5rem;margin:0 auto"><i class="fas fa-user"></i></div>
                            <h5 class="mt-3" id="pName">Student Name</h5>
                        </div>
                        <div class="col-md-9">
                            <div class="row g-3">
                                <div class="col-md-6"><small class="text-muted">Register Number</small>
                                    <div id="pReg" class="fw-500">-</div>
                                </div>
                                <div class="col-md-6"><small class="text-muted">Department</small>
                                    <div id="pDept">CSE</div>
                                </div>
                                <div class="col-md-6"><small class="text-muted">Year</small>
                                    <div id="pYear">-</div>
                                </div>
                                <div class="col-md-6"><small class="text-muted">Email</small>
                                    <div id="pEmail">-</div>
                                </div>
                                <div class="col-md-6"><small class="text-muted">Mobile</small>
                                    <div id="pMob">9000000000</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Change Password Tab -->
                <div class="tab-pane fade" id="change-password" role="tabpanel">
                    <form id="changePasswordForm">
                        <div class="row" style="max-width: 400px">
                            <div class="col-12 mb-3"><label class="form-label">New Password</label><input type="password" name="newPassword" class="form-control" required></div>
                            <div class="col-12 mb-3"><label class="form-label">Confirm New Password</label><input type="password" name="confirmPassword" class="form-control" required></div>
                        </div>
                        <button class="btn btn-primary" type="submit">Update Password</button>
                    </form>
                </div>

                <!-- Change Email Tab -->
                <div class="tab-pane fade" id="change-email" role="tabpanel">
                    <form id="changeEmailForm">
                        <div class="row" style="max-width: 400px">
                            <div class="col-12 mb-3"><label class="form-label">New Email</label><input type="email" name="newEmail" class="form-control" required></div>
                        </div>
                        <button class="btn btn-primary" type="submit">Update Email</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script type="module">
        const pName = document.getElementById('pName');
        const pEmail = document.getElementById('pEmail');
        const pReg = document.getElementById('pReg');
        const pDept = document.getElementById('pDept');
        const pYear = document.getElementById('pYear');
        const pMob = document.getElementById('pMob');

        async function renderProfile() {
            const user = await window.authService.currentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const profile = await window.userService.getCurrentProfile('student');

            if (profile) {
                pName.textContent = profile.fullName || 'Student Name';
                pEmail.textContent = profile.email || 'student@college.edu';
                pReg.textContent = profile.registerNumber || '-';
                pDept.textContent = profile.department || '-';
                pYear.textContent = profile.year || '-';
                pMob.textContent = profile.phone || profile.mobile || '-';
            }
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newPassword = formData.get('newPassword');
            const confirmPassword = formData.get('confirmPassword');

            if (newPassword !== confirmPassword) {
                slToast('Passwords do not match!', 'error');
                return;
            }
            if (passwordStrength(newPassword) < 2) {
                slToast('Use a stronger password', 'error');
                return;
            }

            try {
                await window.authService.changePassword(newPassword);
                slToast('Password updated successfully!', 'success');
                e.target.reset();
            } catch (error) {
                slToast(error.message, 'error');
            }
        });

        document.getElementById('changeEmailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newEmail = formData.get('newEmail');
            if (!isEmail(newEmail)) {
                slToast('Please enter a valid email address.', 'error');
                return;
            }

            try {
                await window.authService.changeEmail(newEmail);
                slToast('Email updated successfully! Please verify your new email.', 'success');
                renderProfile();
                 e.target.reset();
            } catch (error) {
                slToast(error.message, 'error');
            }
        });

        renderProfile();
    </script>
</body>
</html>
